name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Cordova and Build
        run: |
          npm install -g cordova
          cordova create myapp com.hussein.zekr "ZekrApp"
          cd myapp
          cordova platform add android
          rm -rf www/*
          cp -r ../* www/ || true
          cordova build android --no-telemetry

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Zekr-App-Package
          path: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
